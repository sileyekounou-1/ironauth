# Configuration Alembic pour IronAuth.
# L'URL de base est lue depuis la variable d'environnement IRONAUTH_DATABASE_URL
# (voir migrations/env.py). Utiliser un driver async, ex :
#   IRONAUTH_DATABASE_URL="postgresql+asyncpg://user:pass@host/db"
#   IRONAUTH_DATABASE_URL="sqlite+aiosqlite:///./app.db"

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

# Laissé vide : l'URL réelle vient de l'environnement dans env.py
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
